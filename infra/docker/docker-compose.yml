version: "3.9"

services:
  # ─── Databases ────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ai_learning
      POSTGRES_USER: ailearn
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../database/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ailearn"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ─── Backend Microservices ────────────────────────────────────
  auth-service:
    build:
      context: ../../backend/services/auth
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://ailearn:${DB_PASSWORD:-changeme}@postgres:5432/ai_learning
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-in-production}
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8001

  ai-engine:
    build:
      context: ../../backend/services/ai-engine
      dockerfile: Dockerfile
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/1
      DATABASE_URL: postgresql+asyncpg://ailearn:${DB_PASSWORD:-changeme}@postgres:5432/ai_learning
    ports:
      - "8002:8002"
    depends_on:
      - postgres
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 8002

  assessment-service:
    build:
      context: ../../backend/services/assessment
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://ailearn:${DB_PASSWORD:-changeme}@postgres:5432/ai_learning
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/2
      AI_ENGINE_URL: http://ai-engine:8002
    ports:
      - "8003:8003"
    depends_on:
      - postgres
      - ai-engine
    command: uvicorn main:app --host 0.0.0.0 --port 8003

  analytics-service:
    build:
      context: ../../backend/services/analytics
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://ailearn:${DB_PASSWORD:-changeme}@postgres:5432/ai_learning
    ports:
      - "8004:8004"
    depends_on:
      - postgres
    command: uvicorn main:app --host 0.0.0.0 --port 8004

  content-service:
    build:
      context: ../../backend/services/content
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://ailearn:${DB_PASSWORD:-changeme}@postgres:5432/ai_learning
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
    ports:
      - "8005:8005"
    depends_on:
      - postgres
    command: uvicorn main:app --host 0.0.0.0 --port 8005

  # ─── API Gateway (Nginx) ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - auth-service
      - ai-engine
      - assessment-service
      - analytics-service
      - content-service

  # ─── Web App ──────────────────────────────────────────────────
  web:
    build:
      context: ../../web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api
      NEXT_PUBLIC_APP_NAME: "AI Learning Companion"
    ports:
      - "3000:3000"
    depends_on:
      - nginx

volumes:
  postgres_data:
  redis_data:
