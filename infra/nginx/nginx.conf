events { worker_connections 1024; }

http {
    upstream auth_service     { server auth-service:8001; }
    upstream ai_engine        { server ai-engine:8002; }
    upstream assessment       { server assessment-service:8003; }
    upstream analytics        { server analytics-service:8004; }
    upstream content          { server content-service:8005; }
    upstream web_app          { server web:3000; }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";

        # Auth routes
        location /api/auth/ {
            limit_req zone=auth burst=20 nodelay;
            proxy_pass http://auth_service/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # AI Engine routes
        location /api/ai/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://ai_engine/ai/;
            proxy_set_header Host $host;
            client_max_body_size 10M;  # For image uploads
        }

        # Assessment routes
        location /api/assessment/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://assessment/;
            proxy_set_header Host $host;
        }

        # Analytics routes
        location /api/analytics/ {
            proxy_pass http://analytics/;
            proxy_set_header Host $host;
        }

        # Content routes
        location /api/content/ {
            proxy_pass http://content/;
            proxy_set_header Host $host;
        }

        # Web app (Next.js)
        location / {
            proxy_pass http://web_app;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
        }
    }
}
